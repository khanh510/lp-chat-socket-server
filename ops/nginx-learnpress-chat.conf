upstream learnpress_chat_socket {
    least_conn;
    server 127.0.0.1:3010;
    server 127.0.0.1:3011;
}

server {
    # Laragon commonly owns 80/443 and 8080/8443. Use 9443 for a standalone
    # socket proxy, or copy only the location blocks into Laragon's Nginx site.
    listen 9443 ssl http2;
    server_name chat.example.com;

    location /socket.io/ {
        proxy_pass http://learnpress_chat_socket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://learnpress_chat_socket;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
